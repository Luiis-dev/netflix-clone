<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <button class="dark-mode-btn" aria-label="Alternar modo escuro"></button>

    <main>
      <h1>Quem está assistindo?</h1>

      <div class="perfis-container">
        <!-- Perfis existentes -->
        <figure class="perfil">
          <a href="catalogo/catalogo.html">
          <img
            src="/MINHA_NETFLIX/AULA-04/assets/perfil-1.png"
            alt="Perfil do Luis"
          />
          <figcaption>Luis</figcaption>
          </a>
        </figure>
        <figure class="perfil">
          <img
            src="/MINHA_NETFLIX/AULA-04/assets/perfil-2.png"
            alt="Perfil da Duda"
          />
          <figcaption>Duda</figcaption>
        </figure>
        <figure class="perfil">
          <img
            src="/MINHA_NETFLIX/AULA-04/assets/perfil-3.png"
            alt="Perfil do Evton"
          />
          <figcaption>Evton</figcaption>
        </figure>
        <figure class="perfil">
          <img
            src="/MINHA_NETFLIX/AULA-04/assets/perfil-4.png"
            alt="Perfil da Maria"
          />
          <figcaption>Maria</figcaption>
        </figure>

        <!-- Card de Adicionar perfil (dentro da grade) -->
        <figure class="perfil perfil-add">
          <div class="add-icon">+</div>
          <figcaption>Adicionar perfil</figcaption>
        </figure>
      </div>

      <!-- Botão Gerenciar perfis (separado e centralizado) -->
      <div class="gerenciar-container">
        <button class="btn-gerenciar">Gerenciar perfis</button>
      </div>
    </main>

    <script src="index.html"></script>
  </body>
</html>
